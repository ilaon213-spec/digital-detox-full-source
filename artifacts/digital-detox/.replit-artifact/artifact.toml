kind = "web"
previewPath = "/"
title = "디지털 디톡스"
version = "1.0.0"
id = "artifacts/digital-detox"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23675
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/digital-detox run dev"

[services.env]
PORT = "23675"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/digital-detox", "run", "build"]
publicDir = "artifacts/digital-detox/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
